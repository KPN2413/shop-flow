name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint + Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 4. ESLint ────────────────────────────────────────────
      - name: Lint
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives
        continue-on-error: true

      # ── 5. Production build ──────────────────────────────────
      # The most critical check — if Vite can build it, it works.
      # TypeScript errors in shadcn/ui library files are skipped via skipLibCheck.
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

      # ── 6. Confirm build output ──────────────────────────────
      - name: Verify build output
        run: |
          echo "Build output:"
          ls -lh dist/
          echo "✅ Build succeeded"
